<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Weather</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div id="header-container">
            <h1 class="logo">Weather App</h1>
            <nav id="main-nav">
                <a href="#" class="nav-link" aria-current="page">Dashboard</a>
                <a href="#" class="nav-link">Map</a>
                <a href="#" class="nav-link">Education</a>
                <a href="#" class="nav-link">Historical</a>
            </nav>
            <button type="button" id="theme-toggle" aria-label="Toggle theme">🌙</button>
        </div>
    </header>

    <main class="app">
        <section class="search-bar">
            <form id="search-form">
                <input type="text" id="city-input" placeholder="Search for a city">
                <button type="submit">Search</button>
            </form>
        </section>

        <section id="empty-state" class="empty-state">
            <p>Search for a city to see weather data</p>
        </section>

        <section id="weather-content" class="weather-content" hidden>
            <article id="current-weather" class="card current-weather">
                <p>Current weather will appear here</p>
            </article>

            <section id="forecast-strip" class="forecast-strip">
                <div class="forecast-card forecast-card--today">Today</div>
                <div class="forecast-card">Day 2</div>
                <div class="forecast-card">Day 3</div>
                <div class="forecast-card">Day 4</div>
                <div class="forecast-card">Day 5</div>
            </section>

            <section id="insights-panel" class="insights-panel">
                <h2>Today's Hourly Insights</h2>
                <div class="insight-row">Hour 1</div>
                <div class="insight-row">Hour 2</div>
                <div class="insight-row">Hour 3</div>
                <div class="insight-row">Hour 4</div>
                <div class="insight-row">Hour 5</div>
                <div class="insight-row">Hour 6</div>
            </section>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; <b>Weather App.</b></p>
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <span aria-hidden="true"> · </span>
            <a href="#">Terms of Service</a>
            <span aria-hidden="true"> · </span>
            <a href="#">Scientific Data Sources</a>
        </div>
    </footer>

    <script src="backend.js"></script>
</body>
</html>
